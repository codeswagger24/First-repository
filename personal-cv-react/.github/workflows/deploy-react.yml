name: Deploy React App to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json  # no personal-cv-react/

      # 3️⃣ Install dependencies
      - run: npm install

      # 4️⃣ Build the project
      - run: npm run build

      # 5️⃣ Configure GitHub Pages
      - uses: actions/configure-pages@v4

      # 6️⃣ Upload dist folder
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist  # dist folder is inside personal-cv-react

      # 7️⃣ Deploy to GitHub Pages
      - uses: actions/deploy-pages@v4